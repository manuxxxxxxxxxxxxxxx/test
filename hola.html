<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bootstrap</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="container text-center mt-5">
    <div class="p-3 bg-dark text-white rounded">
        <marquee>¡texto en movimiento!</marquee>
    </div>
    
    <h4 class="mt-4">Lienzo canvas</h4>
    <canvas id="hola" width="100" height="50" class="border"></canvas>

    <script>
        var ctx = document.getElementById("hola").getContext("2d")
        ctx.fillStyle = "red"
        ctx.fillRect(10,10,80,30)
    </script>
</body>
</html>
